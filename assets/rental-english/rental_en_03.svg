  <text x="160" y="678" fill="#60F0D2" font-size="24" font-family="Arial" letter-spacing="4">TRUST LAYER 1</text>
  <text x="160" y="740" fill="#EEF4FF" font-size="34" font-family="Arial" font-weight="700">Condition evidence</text>
  <text x="160" y="796" fill="#9AAFC7" font-size="26" font-family="Arial">The platform records equipment status before and after each rental.</text>

