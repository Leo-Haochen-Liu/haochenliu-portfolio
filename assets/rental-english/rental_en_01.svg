<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1100" fill="#07111D"/>
  <rect x="72" y="72" width="1456" height="956" rx="36" fill="#0B1726" stroke="#2D4865"/>
  <circle cx="1338" cy="184" r="210" fill="url(#paint0_radial)" fill-opacity="0.55"/>
  <text x="126" y="182" fill="#81D8FF" font-size="28" font-family="Arial" letter-spacing="8">IDLE ITEM RENTAL APP</text>
  <text x="126" y="286" fill="#EEF4FF" font-size="88" font-family="Arial" font-weight="700">Rent what is idle.</text>
  <text x="126" y="376" fill="#EEF4FF" font-size="88" font-family="Arial" font-weight="700">Unlock what is needed.</text>
  <text x="126" y="464" fill="#9AAFC7" font-size="34" font-family="Arial">An English portfolio adaptation of a product concept focused on</text>
  <text x="126" y="512" fill="#9AAFC7" font-size="34" font-family="Arial">trust, inspection, and better circulation of underused electronics.</text>

  <rect x="126" y="614" width="386" height="262" rx="28" fill="#0E1E31" stroke="#2D4865"/>
  <text x="162" y="682" fill="#60F0D2" font-size="24" font-family="Arial" letter-spacing="4">PROBLEM</text>
  <text x="162" y="742" fill="#EEF4FF" font-size="36" font-family="Arial" font-weight="700">Devices sit unused</text>
  <text x="162" y="792" fill="#9AAFC7" font-size="26" font-family="Arial">Cameras, drones, and niche electronics</text>
  <text x="162" y="828" fill="#9AAFC7" font-size="26" font-family="Arial">often become dormant after purchase.</text>

  <rect x="558" y="614" width="386" height="262" rx="28" fill="#0E1E31" stroke="#2D4865"/>
  <text x="594" y="682" fill="#60F0D2" font-size="24" font-family="Arial" letter-spacing="4">OPPORTUNITY</text>
  <text x="594" y="742" fill="#EEF4FF" font-size="36" font-family="Arial" font-weight="700">Access over ownership</text>
  <text x="594" y="792" fill="#9AAFC7" font-size="26" font-family="Arial">Let owners monetize idle assets while</text>
  <text x="594" y="828" fill="#9AAFC7" font-size="26" font-family="Arial">renters gain temporary access with lower risk.</text>

  <rect x="990" y="614" width="412" height="262" rx="28" fill="#0E1E31" stroke="#2D4865"/>
  <text x="1026" y="682" fill="#60F0D2" font-size="24" font-family="Arial" letter-spacing="4">MODEL</text>
  <text x="1026" y="742" fill="#EEF4FF" font-size="36" font-family="Arial" font-weight="700">Inspection-backed rental</text>
  <text x="1026" y="792" fill="#9AAFC7" font-size="26" font-family="Arial">Platform-managed checks reduce damage disputes,</text>
  <text x="1026" y="828" fill="#9AAFC7" font-size="26" font-family="Arial">condition uncertainty, and trust friction.</text>

  <text x="126" y="968" fill="#81D8FF" font-size="22" font-family="Arial" letter-spacing="5">PORTFOLIO VERSION REBUILT WITH CODE</text>

  <defs>
    <radialGradient id="paint0_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1338 184) rotate(90) scale(210)">
      <stop stop-color="#82D6FF"/>
      <stop offset="1" stop-color="#82D6FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
